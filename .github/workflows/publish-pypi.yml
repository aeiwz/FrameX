name: Publish To PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      repository:
        description: "Upload target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read and validate versions
        id: read
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          pyproject = pathlib.Path("pyproject.toml")
          version_py = pathlib.Path("framex/_version.py")
          data = tomllib.loads(pyproject.read_text(encoding="utf-8"))
          project_version = data["project"]["version"]

          m = re.search(
              r'__version__\s*=\s*["\']([^"\']+)["\']',
              version_py.read_text(encoding="utf-8"),
          )
          if not m:
            raise SystemExit("Could not read __version__ from framex/_version.py")
          code_version = m.group(1)

          if project_version != code_version:
            raise SystemExit(
                f"Version mismatch: pyproject.toml={project_version}, framex/_version.py={code_version}"
            )

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          ref_name = os.environ.get("GITHUB_REF_NAME", "")
          release_tag = os.environ.get("RELEASE_TAG_NAME", "")

          tag = ""
          if event_name == "push" and ref_name:
            tag = ref_name
          elif event_name == "release" and release_tag:
            tag = release_tag

          if tag:
            normalized = tag[1:] if tag.startswith("v") else tag
            if normalized != project_version:
              raise SystemExit(
                  f"Tag/version mismatch: tag={tag}, expected v{project_version}"
              )

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as fh:
            fh.write(f"version={project_version}\n")
            fh.write(f"tag={tag}\n")
          print(f"Validated version: {project_version} (tag: {tag or 'n/a'})")
          PY
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}

  build:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Verify metadata
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ needs.validate-version.outputs.version }}
          path: dist/

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'testpypi'
    needs: [validate-version, build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/frame-xpy
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ needs.validate-version.outputs.version }}
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.repository == 'pypi')
    needs: [validate-version, build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/frame-xpy
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist-${{ needs.validate-version.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
